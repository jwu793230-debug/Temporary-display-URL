<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temporary Display · 导航</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #020617;
    color: #e2e8f0;
    font-family: 'Noto Sans SC', 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
  }
  
  .container {
    max-width: 600px;
    width: 100%;
    background: #0f172a;
    border: 1px solid #1e293b;
    border-radius: 20px;
    padding: 48px 40px;
    box-shadow: 0 0 80px rgba(0,0,0,0.5);
    position: relative;
    overflow: hidden;
  }
  .container::before {
    content: '';
    position: absolute;
    top: -80%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 30% 20%, rgba(168,85,247,0.04) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(59,130,246,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .header {
    text-align: center;
    margin-bottom: 36px;
    position: relative; z-index: 1;
  }
  .header .icon {
    font-size: 40px;
    margin-bottom: 8px;
  }
  .header h1 {
    font-size: 24px;
    font-weight: 700;
    background: linear-gradient(135deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header p {
    font-size: 13px;
    color: #64748b;
    margin-top: 6px;
    font-weight: 300;
  }

  .card-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
    position: relative; z-index: 1;
  }

  .card {
    display: flex;
    align-items: center;
    gap: 16px;
    background: rgba(30,41,59,0.5);
    border: 1px solid #1e293b;
    border-radius: 14px;
    padding: 18px 20px;
    text-decoration: none;
    color: inherit;
    transition: all 0.25s ease;
    cursor: pointer;
  }
  .card:hover {
    background: rgba(139,92,246,0.1);
    border-color: rgba(168,85,247,0.4);
    transform: translateX(4px);
  }
  .card:active {
    transform: translateX(2px) scale(0.99);
  }

  .card .card-icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }
  .card .card-body {
    flex: 1;
    min-width: 0;
  }
  .card .card-title {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.3;
  }
  .card .card-desc {
    font-size: 12px;
    color: #64748b;
    margin-top: 3px;
    line-height: 1.4;
  }
  .card .card-arrow {
    color: #334155;
    font-size: 18px;
    flex-shrink: 0;
    transition: color 0.2s;
  }
  .card:hover .card-arrow {
    color: #a78bfa;
  }

  .footer {
    text-align: center;
    margin-top: 32px;
    color: #1e293b;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    position: relative; z-index: 1;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="icon">📂</div>
    <h1>Temporary Display</h1>
    <p>临时展示页面 · 点击卡片跳转</p>
  </div>

  <div class="card-list">
    <a class="card" href="uniubi-intro.html">
      <div class="card-icon" style="background:rgba(168,85,247,0.15);">
        <span style="filter:none;">🏗</span>
      </div>
      <div class="card-body">
        <div class="card-title">宇泛智能 · 企业介绍</div>
        <div class="card-desc">UNIUBI 公司概况、AI 2.0 技术路线、AIoT 平台、智慧建造方案、硬件矩阵</div>
      </div>
      <div class="card-arrow">→</div>
    </a>

    <a class="card" href="ai-tools-relations.html">
      <div class="card-icon" style="background:rgba(59,130,246,0.15);">
        <span style="filter:none;">🛠</span>
      </div>
      <div class="card-body">
        <div class="card-title">AI 工具生态关系图</div>
        <div class="card-desc">Hermes · DeepSeek · Codex · ChatGPT · Git 之间的层次与协作关系</div>
      </div>
      <div class="card-arrow">→</div>
    </a>
  </div>

  <div class="footer">Temporary Display URL · jwu793230-debug</div>
</div>
</body>
</html>
