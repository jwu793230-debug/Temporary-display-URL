<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffc928">
  <title>What’s-for-dinner PWA</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./assets/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./styles.css?v=4">
</head>
<body>
  <div id="app" class="app-shell">
    <header class="topbar">
      <a class="brand" href="#home" data-route="home" aria-label="回到首页">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M7 8h10"/><path d="M8 16h8"/><path d="M6 20h12a2 2 0 0 0 2-2v-6H4v6a2 2 0 0 0 2 2Z"/><path d="M9 4v4"/><path d="M15 4v4"/></svg>
        </span>
        <span>
          <strong>What’s-for-dinner</strong>
          <small>家庭菜单 PWA</small>
        </span>
      </a>

      <div class="top-actions">
        <button class="icon-button" type="button" data-action="toggle-theme" aria-label="切换亮色或暗色主题" title="主题">
          <svg viewBox="0 0 24 24"><path d="M12 3a6 6 0 0 0 9 7.5A9 9 0 1 1 12 3Z"/></svg>
        </button>
        <button class="status-pill" type="button" data-route="sync">
          <span class="status-dot"></span>
          <span id="syncBadge">本地</span>
        </button>
      </div>
    </header>

    <main class="layout">
      <aside class="side-panel" aria-label="应用导航">
        <nav class="side-nav">
          <button type="button" data-route="home" class="active">
            <svg viewBox="0 0 24 24"><path d="M3 11 12 3l9 8"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg>
            <span>首页</span>
          </button>
          <button type="button" data-route="kitchen">
            <svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M7 8h10"/><path d="M8 16h8"/><path d="M6 20h12a2 2 0 0 0 2-2v-6H4v6a2 2 0 0 0 2 2Z"/></svg>
            <span>厨房</span>
          </button>
          <button type="button" data-route="family">
            <svg viewBox="0 0 24 24"><path d="M16 11a4 4 0 1 0-8 0"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
            <span>家庭</span>
          </button>
          <button type="button" data-route="plans">
            <svg viewBox="0 0 24 24"><path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><path d="M3 6h.01"/><path d="M3 12h.01"/><path d="M3 18h.01"/></svg>
            <span>餐单</span>
          </button>
          <button type="button" data-route="sync">
            <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 0 1 15-6.7"/><path d="M18 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7"/><path d="M6 21v-5h5"/></svg>
            <span>同步</span>
          </button>
        </nav>

        <section class="mini-summary">
          <img src="./assets/kitchen-hero.png" alt="卡通厨房" loading="lazy">
          <strong>本地优先</strong>
          <span>库存、餐单、家庭偏好先存在当前浏览器；GitHub 同步由你手动触发。</span>
        </section>
      </aside>

      <section class="content-panel">
        <div id="viewRoot"></div>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="底部导航">
      <button type="button" data-route="home" class="active"><svg viewBox="0 0 24 24"><path d="M3 11 12 3l9 8"/><path d="M5 10v10h14V10"/></svg><span>首页</span></button>
      <button type="button" data-route="kitchen"><svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M6 20h12a2 2 0 0 0 2-2v-6H4v6a2 2 0 0 0 2 2Z"/></svg><span>厨房</span></button>
      <button type="button" data-route="family"><svg viewBox="0 0 24 24"><path d="M16 11a4 4 0 1 0-8 0"/><path d="M4 21a8 8 0 0 1 16 0"/></svg><span>家庭</span></button>
      <button type="button" data-route="plans"><svg viewBox="0 0 24 24"><path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><path d="M3 6h.01"/></svg><span>餐单</span></button>
      <button type="button" data-route="sync"><svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 0 1 15-6.7"/><path d="M18 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7"/><path d="M6 21v-5h5"/></svg><span>同步</span></button>
    </nav>
  </div>

  <template id="modalTemplate">
    <div class="modal-backdrop" role="dialog" aria-modal="true">
      <div class="modal-card">
        <div class="modal-head">
          <strong id="modalTitle"></strong>
          <button class="icon-button" type="button" data-modal-close aria-label="关闭">
            <svg viewBox="0 0 24 24"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          </button>
        </div>
        <div id="modalBody"></div>
      </div>
    </div>
  </template>

  <script src="./app.js?v=4" defer></script>
</body>
</html>
